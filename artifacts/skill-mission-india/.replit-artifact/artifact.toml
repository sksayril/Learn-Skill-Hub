kind = "web"
previewPath = "/"
title = "Skill Mission India"
version = "1.0.0"
id = "artifacts/skill-mission-india"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18959

[services.development]
run = "npm run dev --workspace=@workspace/skill-mission-india"

[services.production]
build = [ "npm", "run", "build", "--workspace=@workspace/skill-mission-india" ]

[services.production.run]
args = [ "npm", "run", "start", "--workspace=@workspace/skill-mission-india" ]

[services.production.run.env]
PORT = "18959"
NODE_ENV = "production"

[services.env]
PORT = "18959"
BASE_PATH = "/"
